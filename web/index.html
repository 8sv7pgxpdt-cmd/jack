<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Vibe Coding 内容聚合</title>
<style>
  :root {
    --bg: #f4f5f7;
    --card: #fff;
    --text: #222;
    --text2: #666;
    --text3: #999;
    --accent: #2563eb;
    --accent-warm: #f59e0b;
    --border: #e8e8ed;
    --shadow: 0 1px 3px rgba(0,0,0,.06);
    --shadow-hover: 0 4px 16px rgba(0,0,0,.1);
    --radius: 10px;
    --font: -apple-system, BlinkMacSystemFont, "PingFang SC", "Microsoft YaHei", "Helvetica Neue", sans-serif;
  }

  * { margin:0; padding:0; box-sizing:border-box; }

  body {
    font-family: var(--font);
    background: var(--bg);
    color: var(--text);
    line-height: 1.6;
  }

  /* ===== header ===== */
  .header {
    background: #fff;
    border-bottom: 1px solid var(--border);
    padding: 20px 0;
    position: sticky; top: 0; z-index: 100;
  }
  .header-inner {
    max-width: 1280px; margin: 0 auto; padding: 0 24px;
    display: flex; align-items: center; justify-content: space-between;
  }
  .logo {
    font-size: 1.25rem; font-weight: 700;
    color: var(--text); letter-spacing: -0.5px;
  }
  .logo .dot {
    color: var(--accent); margin: 0 2px;
  }
  .update-text {
    font-size: .75rem; color: var(--text3);
  }

  /* ===== main ===== */
  .main {
    max-width: 1280px; margin: 0 auto; padding: 24px;
  }

  /* ===== toolbar ===== */
  .toolbar {
    display: flex; gap: 10px; align-items: center;
    margin-bottom: 20px; flex-wrap: wrap;
  }
  .toolbar input {
    flex: 1; min-width: 200px; max-width: 360px;
    padding: 10px 16px;
    border: 1px solid var(--border); border-radius: 8px;
    font-size: .88rem; outline: none;
    background: #fff; transition: border-color .2s;
  }
  .toolbar input:focus { border-color: var(--accent); }
  .toolbar input::placeholder { color: #bbb; }

  .chip {
    padding: 8px 18px; border-radius: 20px;
    border: 1px solid var(--border); background: #fff;
    font-size: .82rem; cursor: pointer;
    transition: all .18s; user-select: none; white-space: nowrap;
  }
  .chip:hover { border-color: var(--accent); color: var(--accent); }
  .chip.active {
    background: var(--accent); color: #fff; border-color: var(--accent);
  }

  .stat-row {
    font-size: .78rem; color: var(--text3); margin-bottom: 20px;
    display: flex; gap: 18px; flex-wrap: wrap;
  }
  .stat-row b { color: var(--text); font-weight: 600; }

  /* ===== day section ===== */
  .day-section { margin-bottom: 32px; }
  .day-label {
    font-size: .82rem; font-weight: 600; color: var(--text2);
    padding: 8px 0; margin-bottom: 12px;
    border-bottom: 1px solid var(--border);
    text-transform: uppercase; letter-spacing: 1px;
  }

  /* ===== card grid ===== */
  .card-grid {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 14px;
  }

  /* ===== card ===== */
  .card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 18px 20px;
    box-shadow: var(--shadow);
    transition: box-shadow .18s, transform .18s;
    display: flex; flex-direction: column;
    gap: 8px;
  }
  .card:hover {
    box-shadow: var(--shadow-hover);
    transform: translateY(-2px);
  }
  .card.featured {
    border-left: 3px solid var(--accent-warm);
  }

  .card .meta-top {
    display: flex; align-items: center; gap: 6px;
    font-size: .72rem; color: var(--text3);
  }
  .card .meta-top .src {
    background: #f0f2f5; padding: 2px 8px; border-radius: 4px;
    font-weight: 500; color: var(--text2);
  }
  .card .meta-top .cat {
    padding: 2px 8px; border-radius: 4px; font-weight: 600;
    font-size: .68rem;
  }
  .cat-tutorial { background: #eff6ff; color: #2563eb; }
  .cat-news    { background: #f5f5f5; color: #666; }
  .cat-featured { background: #fffbeb; color: #d97706; }

  .card h3 {
    font-size: .9rem; font-weight: 600; line-height: 1.5;
    flex: 1;
  }
  .card h3 a {
    color: var(--text); text-decoration: none;
  }
  .card h3 a:hover { color: var(--accent); }

  .card .summary {
    font-size: .8rem; color: var(--text2); line-height: 1.55;
    display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical;
    overflow: hidden;
  }

  .card .meta-bottom {
    display: flex; align-items: center; justify-content: space-between;
    font-size: .72rem; color: var(--text3);
    flex-wrap: wrap; gap: 4px;
    margin-top: auto;
  }

  /* ===== responsive ===== */
  @media (max-width: 1000px) {
    .card-grid { grid-template-columns: repeat(2, 1fr); }
  }
  @media (max-width: 640px) {
    .main { padding: 16px; }
    .card-grid { grid-template-columns: 1fr; }
    .header-inner { padding: 0 16px; }
    .toolbar input { max-width: none; }
  }

  /* ===== empty ===== */
  .empty {
    text-align: center; padding: 80px 20px; color: #bbb;
    font-size: .9rem;
  }

  /* ===== footer ===== */
  .footer {
    text-align: center; padding: 40px 20px 50px;
    font-size: .74rem; color: #ccc;
  }
</style>
</head>
<body>

<div class="header">
  <div class="header-inner">
    <div class="logo">VIBE<span class="dot">·</span>CODING</div>
    <div class="update-text" id="updateTime">加载中...</div>
  </div>
</div>

<div class="main">

  <!-- 工具栏 -->
  <div class="toolbar">
    <input type="text" id="searchInput" placeholder="搜索标题、摘要...">
    <span class="chip active" data-cat="全部">全部</span>
    <span class="chip" data-cat="教程">教程</span>
    <span class="chip" data-cat="资讯">资讯</span>
    <span class="chip" data-cat="精华">精华</span>
  </div>

  <div class="stat-row" id="statRow"></div>

  <!-- 内容区 -->
  <div id="content"></div>
  <div class="empty" id="empty" style="display:none">暂无内容，请运行抓取脚本更新数据</div>

</div>

<div class="footer">由 Python + GitHub Actions 驱动 · 每日自动更新</div>

<script>
const DATA_URL = "articles.json";

let allArticles = [];
let activeCat = "全部";

async function loadData() {
  try {
    const resp = await fetch(DATA_URL);
    if (!resp.ok) throw new Error("HTTP " + resp.status);
    allArticles = (await resp.json()).articles || [];
  } catch (e) {
    console.error("加载失败:", e);
    allArticles = [];
  }

  const ua = allArticles.length > 0 ? allArticles[0].fetched_at : null;
  document.getElementById("updateTime").textContent = ua
    ? `更新于 ${formatTime(ua)}`
    : "暂无数据";

  renderStats();
  renderAll();
}

function renderStats() {
  const cats = { "教程": 0, "资讯": 0, "精华": 0 };
  allArticles.forEach(a => { cats[a.category] = (cats[a.category] || 0) + 1; });
  document.getElementById("statRow").innerHTML =
    `共 <b>${allArticles.length}</b> 篇 · 教程 <b>${cats["教程"]}</b> · 资讯 <b>${cats["资讯"]}</b> · 精华 <b>${cats["精华"]}</b>`;
}

function renderAll() {
  const search = (document.getElementById("searchInput").value || "").toLowerCase();
  let filtered = allArticles;
  if (activeCat !== "全部") {
    filtered = filtered.filter(a => a.category === activeCat);
  }
  if (search) {
    filtered = filtered.filter(a =>
      (a.title||"").toLowerCase().includes(search) ||
      (a.summary||"").toLowerCase().includes(search) ||
      (a.source||"").toLowerCase().includes(search)
    );
  }

  const container = document.getElementById("content");
  const empty = document.getElementById("empty");

  if (filtered.length === 0) {
    container.innerHTML = "";
    empty.style.display = "block";
    return;
  }
  empty.style.display = "none";

  // 按天分组
  const groups = {};
  filtered.forEach(a => {
    const day = (a.published_at || "").slice(0, 10);
    if (!groups[day]) groups[day] = [];
    groups[day].push(a);
  });

  let html = "";
  for (const [day, items] of Object.entries(groups).sort((a,b) => b[0].localeCompare(a[0]))) {
    html += `<div class="day-section">`;
    html += `<div class="day-label">${formatDay(day)}</div>`;
    html += `<div class="card-grid">`;
    items.forEach(a => {
      const catClass = a.category === "精华" ? "cat-featured"
        : a.category === "教程" ? "cat-tutorial" : "cat-news";
      const catLabel = a.category === "精华" ? "精华"
        : a.category === "教程" ? "教程" : "资讯";
      html += `
      <div class="card ${a.category === '精华' ? 'featured' : ''}">
        <div class="meta-top">
          <span class="src">${a.source_icon||''} ${esc(a.source)}</span>
          <span class="cat ${catClass}">${catLabel}</span>
        </div>
        <h3><a href="${esc(a.url)}" target="_blank" rel="noopener">${esc(a.title)}</a></h3>
        ${a.summary ? `<div class="summary">${esc(a.summary)}</div>` : ''}
        <div class="meta-bottom">
          <span>${esc(a.author)} · ${formatTime(a.published_at)}</span>
        </div>
      </div>`;
    });
    html += `</div></div>`;
  }
  container.innerHTML = html;
}

// utils
function esc(s) {
  if (!s) return "";
  const d = document.createElement("div");
  d.textContent = s;
  return d.innerHTML;
}

function formatTime(iso) {
  if (!iso) return "";
  const d = new Date(iso);
  const diff = Date.now() - d;
  if (diff < 36e5) return `${Math.floor(diff/6e4)}分钟前`;
  if (diff < 864e5) return `${Math.floor(diff/36e5)}小时前`;
  if (diff < 6048e5) return `${Math.floor(diff/864e5)}天前`;
  return d.toLocaleDateString("zh-CN");
}

function formatDay(iso) {
  if (!iso) return "";
  const d = new Date(iso + "T00:00:00");
  const today = new Date(); today.setHours(0,0,0,0);
  const yesterday = new Date(today - 86400000);
  const thatDay = new Date(d.getFullYear(), d.getMonth(), d.getDate());
  if (thatDay.getTime() === today.getTime()) return "今天";
  if (thatDay.getTime() === yesterday.getTime()) return "昨天";
  return thatDay.toLocaleDateString("zh-CN", { month:"long", day:"numeric", weekday:"short" });
}

// events
document.getElementById("searchInput").addEventListener("input", renderAll);
document.querySelectorAll(".chip").forEach(chip => {
  chip.addEventListener("click", () => {
    document.querySelectorAll(".chip").forEach(c => c.classList.remove("active"));
    chip.classList.add("active");
    activeCat = chip.dataset.cat;
    renderAll();
  });
});

loadData();
</script>
</body>
</html>
