name: Daily Vibe Coding Fetch

on:
  push:
    paths:
      - "aggregator.py"
      - "sources.json"
      - "requirements.txt"
      - "manual.json"
      - "web/**"
      - ".github/workflows/**"
  schedule:
    # 每 6 小时抓一次（北京时间 2:00 / 8:00 / 14:00 / 20:00）
    - cron: "0 2,8,14,20 * * *"
  workflow_dispatch:

jobs:
  fetch:
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Fetch content
        run: python aggregator.py

      - name: Commit & push updated data
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          # 提交数据文件变更
          git add data/articles.json web/articles.json

          if git diff --cached --quiet; then
            echo "No changes, skip commit."
          else
            git commit -m "📡 Daily content update: $(date +'%Y-%m-%d')"
            git push
          fi
